name: Infra-Web-Cloud-CI
on:
  push:
    branches: [ main ]

jobs:
  Security_Audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan Secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main

      - name: Run Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
