name: Infra-Web-Cloud-CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Security_Audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Scans repository tracking lines for exposed secrets or API keys
      - name: Scan Secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          base: ""
          head: ${{ github.sha }}

      # Static analysis layer auditing structural manifests and logic bugs
      - name: Run Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
