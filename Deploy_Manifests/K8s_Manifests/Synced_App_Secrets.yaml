apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: production-infrastructure-secrets
  namespace: core-infrastructure
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: platform-runtime-env
    creationPolicy: Owner
  data:
    - secretKey: db_password
      remoteRef:
        key: internal/database
        property: password
