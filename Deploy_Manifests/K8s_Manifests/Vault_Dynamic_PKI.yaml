apiVersion: vault.hashicorp.com/v1alpha1
kind: VaultPKIEngine
metadata:
  name: cluster-internal-pki
  namespace: core-infrastructure
spec:
  path: "pki_internal"
  config:
    default_lease_ttl: "24h"
    max_lease_ttl: "720h"
  roles:
    - name: "mesh-microservice-domain"
      allowed_domains: "core-infrastructure.svc.cluster.local"
      allow_subdomains: true
