apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-mesh-config
  namespace: core-infrastructure
data:
  vault-agent-config.hcl: |
    exit_after_auth = false
    pid_file = "/home/vault/vault-agent.pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "infrastructure-application-runner"
        }
      }
    }

    sink "file" {
      config = {
        path = "/vault/secrets/token"
      }
    }
