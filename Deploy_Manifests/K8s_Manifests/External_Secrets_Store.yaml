apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: core-infrastructure
spec:
  provider:
    vault:
      server: "https://vault-core.core-infrastructure.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "infra-sync-role"
