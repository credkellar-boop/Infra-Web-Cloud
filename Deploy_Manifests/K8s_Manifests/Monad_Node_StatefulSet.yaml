apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: monad-execution-node
  namespace: core-infrastructure
spec:
  serviceName: "monad-validator"
  replicas: 1
  selector:
    matchLabels:
      app: monad-validator-core
  template:
    metadata:
      labels:
        app: monad-validator-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
      - name: monad-client
        image: monad-project/execution-client:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            memory: "16Gi"
            cpu: "8"
            baremetal_sriov_nics: "1"
          limits:
            memory: "32Gi"
            cpu: "16"
            baremetal_sriov_nics: "1"
        volumeMounts:
        - name: validator-nvme-storage
          mountPath: /var/lib/monad/data
        - name: tmp-dir
          mountPath: /tmp
  volumeClaimTemplates:
  - metadata:
      name: validator-nvme-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "baremetal-encrypted-nvme"
      resources:
        requests:
          storage: 500Gi
