apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-grafana-dashboard
  namespace: core-infrastructure
  labels:
    # This label is critical. It tells the Grafana sidecar to auto-load this JSON.
    grafana_dashboard: "1" 
data:
  hubble-dashboard.json: |
    {
      "title": "Cilium Hubble - Network Observability",
      "uid": "hubble-ebpf-flows",
      "tags": ["cilium", "hubble", "ebpf", "security"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "title": "Total Dropped Packets (eBPF/XDP Boundary)",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(hubble_drop_total[5m])) by (reason)",
              "legendFormat": "{{reason}}"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
        },
        {
          "title": "Ingress Flow Latency (P95)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(hubble_tcp_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P95 Latency"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
        },
        {
          "title": "Active Network Flows by Source",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(hubble_flows_processed_total[2m])) by (source)",
              "legendFormat": "{{source}}"
            }
          ],
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }
        }
      ]
    }
