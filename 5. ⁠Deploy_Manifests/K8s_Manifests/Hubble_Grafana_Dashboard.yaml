apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-ebpf-dashboard
  namespace: core-infrastructure
  labels:
    grafana_dashboard: "1"
data:
  ebpf-network-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "type": "timeseries",
          "title": "Kernel Dropped Packets via eBPF XDP Hooks",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(cilium_bpf_map_ops_total{op=\"drop\"}[5m])",
              "legendFormat": "{{pod}} - Map Drop Trace"
            }
          ]
        }
      ],
      "schemaVersion": 36,
      "title": "eBPF Core Kernel Security Health Topology"
    }
