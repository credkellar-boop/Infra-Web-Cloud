version: '3.8'

services:
  local-vault:
    image: vault:1.13.3
    container_name: local-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-token-local-secure"
      VAULT_LOCAL_CONFIG: '{"backend": {"file": {"path": "/vault/file"}}, "default_lease_ttl": "168h", "max_lease_ttl": "720h"}'
    ports:
      - "8200:8200"
    # Hardened boundaries to clear privilege escalation and writable FS rules
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /vault/logs
    volumes:
      - vault_data:/vault/file
    networks:
      - enclave_net
    restart: unless-stopped

volumes:
  vault_data:
    driver: local

networks:
  enclave_net:
    driver: bridge
